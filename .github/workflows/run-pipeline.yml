name: Run Scoring Pipeline

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Space-separated tickers to run (leave blank for full S&P 500)'
        required: false
        default: ''
      index_tag:
        description: 'Only with tickers set: tag this batch (e.g. SP400, SP600) so it stays hidden from the live site launch gate'
        required: false
        default: ''

jobs:
  pipeline-single:
    if: ${{ github.event.inputs.tickers != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: pipeline
      - run: |
          if [ -n "${{ github.event.inputs.index_tag }}" ]; then
            python3 sec/run_sec.py --tickers ${{ github.event.inputs.tickers }} --index-tag ${{ github.event.inputs.index_tag }}
          else
            python3 sec/run_sec.py --tickers ${{ github.event.inputs.tickers }}
          fi
        working-directory: pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      - run: python3 rescore.py --tickers ${{ github.event.inputs.tickers }}
        working-directory: pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  pipeline:
    if: ${{ github.event.inputs.tickers == '' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - { offset: 0 }
          - { offset: 25 }
          - { offset: 50 }
          - { offset: 75 }
          - { offset: 100 }
          - { offset: 125 }
          - { offset: 150 }
          - { offset: 175 }
          - { offset: 200 }
          - { offset: 225 }
          - { offset: 250 }
          - { offset: 275 }
          - { offset: 300 }
          - { offset: 325 }
          - { offset: 350 }
          - { offset: 375 }
          - { offset: 400 }
          - { offset: 425 }
          - { offset: 450 }
          - { offset: 475 }
      fail-fast: false
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: pipeline
      - run: python3 sec/run_sec.py --offset ${{ matrix.offset }} --limit 25 --skip-pe-ratios --smart-pull
        working-directory: pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      - run: python3 rescore.py --offset ${{ matrix.offset }} --limit 25
        working-directory: pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  pe-ratios:
    needs: pipeline
    if: ${{ !cancelled() && (github.event.inputs.tickers == '' || github.event_name == 'schedule') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: pipeline
      - run: python3 sec/run_sec.py --pe-ratios-only
        working-directory: pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
