name: Run Scoring Pipeline

on:
  schedule:
    - cron: "0 0 * * 1"   # Every Monday at 00:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # SEC EDGAR pipeline — migrated from FMP on 2026-05-17
        # Backup: python3 run.py (FMP pipeline, keep for rollback)
        run: python3 sec/run_sec.py
