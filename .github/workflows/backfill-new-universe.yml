name: Backfill New Universe

# Manual-only, one-off (or re-runnable) backfill for a new index group (S&P
# 400, S&P 600, ...) BEFORE it goes live. Completely separate from
# run-pipeline.yml's weekly S&P 500 job — never touches it, never runs on a
# schedule. Every ticker pulled here is tagged via --index-tag so it stays
# hidden from the live site's launch gate (see lib/constants.ts) until
# someone deliberately removes that tag from the gate list.

on:
  workflow_dispatch:
    inputs:
      ticker_file:
        description: 'CSV in pipeline/sec/ to backfill (e.g. sp400_tickers.csv, sp600_tickers.csv)'
        required: true
      index_tag:
        description: 'Tag applied to every ticker in this batch (e.g. SP400, SP600)'
        required: true
      batch_size:
        description: 'Tickers per parallel job'
        required: false
        default: '25'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      count: ${{ steps.gen.outputs.count }}
    steps:
      - uses: actions/checkout@v3
      - id: gen
        run: |
          COUNT=$(grep -c . "pipeline/sec/${{ github.event.inputs.ticker_file }}")
          MATRIX=$(python3 -c "
          import json
          count = $COUNT
          batch = ${{ github.event.inputs.batch_size }}
          offsets = list(range(0, count, batch))
          print(json.dumps({'include': [{'offset': o} for o in offsets]}))
          ")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  backfill:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: pipeline
      - run: |
          python3 sec/run_sec.py \
            --ticker-file "${{ github.event.inputs.ticker_file }}" \
            --offset ${{ matrix.offset }} \
            --limit ${{ github.event.inputs.batch_size }} \
            --index-tag "${{ github.event.inputs.index_tag }}" \
            --skip-pe-ratios
        working-directory: pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      - run: |
          python3 rescore.py \
            --ticker-file "${{ github.event.inputs.ticker_file }}" \
            --offset ${{ matrix.offset }} \
            --limit ${{ github.event.inputs.batch_size }}
        working-directory: pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  pe-ratios:
    needs: backfill
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: pipeline
      - run: python3 sec/run_sec.py --pe-ratios-only
        working-directory: pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
